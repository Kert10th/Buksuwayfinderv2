
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <!-- Lock viewport scaling on touchscreen kiosks (maximum-scale=1 +
           user-scalable=no). The map has its own zoom controls — users
           shouldn't be able to pinch-zoom the whole browser chrome. -->
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
      <title>BukSU Wayfinder</title>
      <link rel="icon" type="image/png" href="/buksuwayfinder-icon.png" />
      <link rel="apple-touch-icon" href="/buksuwayfinder-icon.png" />
      <!-- Preload the campus map so it's cached by the time React mounts -->
      <link rel="preload" as="image" href="/campus-map.png" />
      <link rel="preload" as="image" href="/wayfinder-logo.png" />
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
